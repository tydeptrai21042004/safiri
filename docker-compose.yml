services:
  api:
    build: .
    environment:
      SAFIRI_PROJECT_ROOT: /app
    ports:
      - "8000:8000"
  dashboard:
    build: .
    command: ["python", "-m", "streamlit", "run", "dashboard/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    environment:
      SAFIRI_PROJECT_ROOT: /app
    ports:
      - "8501:8501"

